<body>

  <main class="container my-5 mx-auto">

    <h1 class="text-muted text-center my-4">Weather Ninja</h1>

    <form class="change-location my-4 text-center text-muted">
      <label for="city">Enter a location for weather information</label>
      <input type="text" name="city" class="form-control p-4">
    </form>

    <section class="card shadow-lg rounded d-none">
      <img src="https://via.placeholder.com/400x300" class="time card-img-top">
      <div class="icon bg-light mx-auto text-center">
        <img src="" alt="">
      </div>
      <div class="text-muted text-uppercase text-center details">
        <h5 class="my-3">City name</h5>
        <div class="my-3">Weather condition</div>
        <div class="display-4 my-4">
          <span>temp</span>
          <span>&deg;C</span>
        </div>
      </div>
    </section>

  </main>

  <figure class="B__E--M">
    <button type="button" title="Go to page top" aria-label="Bookmark" onclick="location.href='#top';">
      <picture>
        <!-- <source sizes="" srcset="" type="image/" media="(min-width: )" /> -->
        <img src="images/copyright.png" alt="Copyright to Coding Sable" width="64px" height="64px" />
      </picture>
    </button>
  </figure>

  <noscript>The web-browser does NOT support JavaScript or it is switched off!</noscript>

</body>
